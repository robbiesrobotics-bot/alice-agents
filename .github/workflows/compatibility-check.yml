name: A.L.I.C.E. Compatibility Check

on:
  schedule:
    # Daily check at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'snapshots/**'
      - 'tools/compatibility-checker.mjs'

jobs:
  detect-runtime-release:
    name: Detect Runtime Release
    runs-on: ubuntu-latest
    outputs:
      openclaw-version: ${{ steps.check.outputs.openclaw-version }}
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new OpenClaw release
        id: check
        run: |
          LATEST=$(npm view openclaw version 2>/dev/null || echo "unknown")
          echo "openclaw-version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest OpenClaw: $LATEST"

          if [ -f "compatibility-reports/$LATEST.json" ]; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "Already tested $LATEST"
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "New version to test: $LATEST"
          fi

  check-compatibility:
    name: Run Compatibility Checker
    runs-on: ubuntu-latest
    needs: detect-runtime-release
    if: needs.detect-runtime-release.outputs.has-changes == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install OpenClaw (NemoClaw runtime base)
        run: |
          npm install -g openclaw@${{ needs.detect-runtime-release.outputs.openclaw-version }}
          openclaw --version

      - name: Run compatibility checker
        id: check
        run: |
          node tools/compatibility-checker.mjs \
            --verbose \
            --output=/tmp/report.json

          COMPATIBLE=$(jq -r '.compatible' /tmp/report.json)
          TOTAL=$(jq -r '.summary.total' /tmp/report.json)

          echo "compatible=$COMPATIBLE" >> $GITHUB_OUTPUT
          echo "total-issues=$TOTAL" >> $GITHUB_OUTPUT

          mkdir -p compatibility-reports
          cp /tmp/report.json compatibility-reports/${{ needs.detect-runtime-release.outputs.openclaw-version }}.json

      - name: Create GitHub issue on breaking changes
        if: steps.check.outputs.compatible == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/report.json', 'utf8'));
            const criticals = report.breakingChanges.filter(c => c.severity === 'critical' || c.severity === 'high');
            const body = `
            ## A.L.I.C.E. Compatibility Alert

            OpenClaw **${report.openclawVersion}** introduces breaking changes for A.L.I.C.E.

            **Total issues:** ${report.summary.total} | **Critical/High:** ${criticals.length}

            ${report.breakingChanges.map(c => `- **[${c.severity}]** \`${c.field}\` — ${c.change}`).join('\n')}
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Breaking changes in OpenClaw ${report.openclawVersion}`,
              body,
              labels: ['compatibility']
            });

      - name: Commit compatibility report
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: compatibility report for OpenClaw ${{ needs.detect-runtime-release.outputs.openclaw-version }}'
          file_pattern: 'compatibility-reports/**'

  publish-patch:
    name: Publish Patch (if needed)
    runs-on: ubuntu-latest
    needs: [detect-runtime-release, check-compatibility]
    if: failure() && needs.check-compatibility.result == 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump patch version and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm version patch --no-git-tag-version
          npm publish --access public

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: bump version for OpenClaw ${{ needs.detect-runtime-release.outputs.openclaw-version }} compatibility'
          file_pattern: 'package.json'
