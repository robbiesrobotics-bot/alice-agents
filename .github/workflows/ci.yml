name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check (lib + bin)
        run: |
          for f in lib/*.mjs bin/*.mjs; do
            echo "Checking $f..."
            node --check "$f"
          done

      - name: Run tests (if script exists)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)" 2>/dev/null; then
            npm test
          else
            echo "No test script defined — skipping (tests coming soon)"
          fi
